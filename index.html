  <!-- OneSignal Web Push SDK v16 (browser/PWA only — NOT loaded in Capacitor WebView) -->
  <script>
    (function () {
      // Detect Capacitor native shell. If we're inside an installed Android/iOS app,
      // the native OneSignal Cordova plugin handles registration via FCM/APNs.
      // Loading the Web SDK here would create a parallel "Chrome (web)" subscription
      // and prevent the device from being registered as Android in OneSignal.
      var isCapacitor =
        !!(window).Capacitor && (window).Capacitor.isNativePlatform && (window).Capacitor.isNativePlatform();
      if (isCapacitor) {
        console.log("[OneSignal] Skipping Web SDK init — running in Capacitor (native plugin handles push)");
        return;
      }
      var s = document.createElement("script");
      s.src = "https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js";
      s.defer = true;
      document.head.appendChild(s);
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      window.OneSignalDeferred.push(async function (OneSignal) {
        try {
          await OneSignal.init({
            appId: "6c5a2ebd-7e22-4ab6-a00f-df4835aba737",
            allowLocalhostAsSecureOrigin: true,
            serviceWorkerParam: { scope: "/" },
            serviceWorkerPath: "OneSignalSDKWorker.js",
            serviceWorkerUpdaterPath: "OneSignalSDKUpdaterWorker.js",
            notifyButton: { enable: false },
          });
          console.log("[OneSignal] Web SDK initialized");
        } catch (e) {
          console.warn("[OneSignal] Web init failed", e);
        }
      });
    })();
  </script>
